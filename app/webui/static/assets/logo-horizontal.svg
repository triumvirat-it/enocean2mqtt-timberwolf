          fill="#1a1f2c"
          letter-spacing="-0.4">triumvirat<tspan dx="14" fill="#ff6b6b">IT</tspan><tspan dx="10" font-weight="500" font-size="22" fill="#1a1f2c" opacity="0.7">Solutions</tspan></text>
