    <title>triumvirat IT Solutions – Logo (horizontal, einzeilig)</title>
    <!-- Bildmarke -->
    <g>
        <rect width="64" height="64" rx="14" ry="14" fill="#1a1f2c"/>
        <rect x="19" y="20" width="6" height="24" rx="3" fill="#ff6b6b"/>
        <rect x="29" y="24" width="6" height="16" rx="3" fill="#fcd34d"/>
