<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64" role="img" aria-label="triumvirat IT Solutions Logo invertiert">
    <title>triumvirat IT Solutions – Logo invertiert (für dunkle Hintergründe)</title>
    <!-- Bildmarke mit transparentem Block -->
    <g>
        <rect width="64" height="64" rx="14" ry="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
        <rect x="19" y="20" width="6" height="24" rx="3" fill="#ff6b6b"/>
        <rect x="29" y="24" width="6" height="16" rx="3" fill="#fcd34d"/>
        <rect x="39" y="17" width="6" height="30" rx="3" fill="#2dd4bf"/>
    </g>
    <!-- Wortmarke in weiß -->
    <text x="82" y="34"
          font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
          font-weight="600" font-size="26"
          fill="#ffffff"
          letter-spacing="-0.4">triumvirat</text>
    <text x="82" y="52"
          font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif"
          font-weight="500" font-size="10"
          fill="#ffffff"
          letter-spacing="2.6"
          opacity="0.6">
        <tspan font-weight="600" fill="#ff6b6b" opacity="1" letter-spacing="1.5">IT</tspan>
        <tspan dx="6">SOLUTIONS</tspan>
    </text>
</svg>
