  device_type: PTMSwitchModule_10
  config: NrOfButtons=1;RecoverButtonState=true;AutoAssignIds=true;
  description: |
    REG-Tasterschnittstelle mit 10 Eingaengen.

    WICHTIG: FTS14EM ist KEIN FAM14-Bus-Modul mit eigener Bus-Adresse.
    Sie wird ueber zwei Drehschalter am Modul konfiguriert und sendet
    feste Quasi-Dezimal-IDs (0x10XX..0x14XX), unabhaengig vom FAM14-Block.

      Untere Drehschalter: Gruppe 1 | 101 | 201 | 301 | 401  + Modus UT/RT
      Oberer Drehschalter: 0 | 10 | 20 | ... | 90

    UT-Modus: 10 Eingaenge -> 10 Sender-IDs (E1..E10)
    RT-Modus: 5 gepaarte Wippen -> 5 Sender-IDs (E1+E2, E3+E4, ...)

    Beispiele (Gruppe 1, Drehschalter 0):
      E1 (rechts oben)  -> 0x00001001  Datenbyte 0x70
      E2 (rechts unten) -> 0x00001002  Datenbyte 0x50
      E3 (links  oben)  -> 0x00001003  Datenbyte 0x30
      E4 (links  unten) -> 0x00001004  Datenbyte 0x10
      E5..E10           -> 0x00001005..0x00001010 (Muster wiederholt)

    Achtung "Quasi-Dezimal": nach 0x1009 kommt 0x1010, nicht 0x100A.

    Die Telegramme dieser IDs laufen ueber den RS485-Bus, NICHT ueber
    Funk (ohne FTS14FA-Funkausgabemodul). enocean2mqtt empfaengt sie
    daher nie selbst — die IDs werden im System als Observer an
    Aktor-Channels gehaengt, um die Verkabelung im Eltako-Bus zu
    dokumentieren und die Trigger-Quelle visualisieren zu koennen.
- manufacturer: Eltako
  model: FTS14EM Tastereingabe
  device_type: WindowContact
  config: ReceiveEEP=Eltako_FTS14EMasButtonInput
  description: Magnetkontakt
