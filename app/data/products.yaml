- manufacturer: Eltako
  model: DSZ14WDRS-3x5A
  com_profile: A5-12-01
  device_type: EnergyMeter_Bi
  fam14_bus: true
  fam14_addressing: hex
  description: |
    Funk-Stromzaehler mit Wandler, Doppeltarif (HT/NT) — 1 Sender-ID.

    Sender-ID = FAM14-Base-ID | (PCT14-Adresse als Hex)
    Beispiel: Base FF800080, Adresse 5 -> FF800085
  multi_channel_kind: tariff_byte
- manufacturer: Eltako
  model: F3Z14D
  com_profile: A5-12-01
  device_type: EnergyMeter_3
  fam14_bus: true
  fam14_addressing: hex
  config: NoTariff=true;
  description: |
    3-Eingang-Zaehler (Strom/Gas/Wasser kombinierbar).

    Sender-IDs berechnen — alles steht in PCT14:
      Sender-ID = FAM14-Base-ID | (PCT14-Adresse als Hex + Eingang-Offset)
      Eingang 1: Offset +0
      Eingang 2: Offset +1
      Eingang 3: Offset +2

    Beispiel: FAM14 Base FF800080, F3Z14D-Adresse 35 (= 0x23):
      Eingang 1 -> FF8000A3
      Eingang 2 -> FF8000A4
      Eingang 3 -> FF8000A5

    PCT14 zeigt die Geraeteadresse oben links beim Modul (dezimal).
    Die FAM14-Base-ID steht im Konfigurationsbereich des FAM14.

    EEP pro Eingang gemaess Eingangstyp im PCT14:
      A5-12-01 Strom (kWh/W) - A5-12-02 Gas (m³/m³h) - A5-12-03 Wasser (m³/L·min)

    Power-Cycle des F3Z14D loest pro Eingang ein Lerntelegramm aus —
    das System uebernimmt den EEP-Wechsel automatisch (Auto-EEP-Sync).
  multi_channel_kind: separate_ids   # 3 Sender-IDs, je 1 pro Sub-Zaehler
  # F3Z14D sendet KEINE Seriennummer (laut Eltako-Doku nur DSZ14(W)DRS).
  # Tag/Nacht-Tarif jedoch unterstuetzt — DB0=0x1C wird vom Decoder als
  # tariff=1 ausgewertet und im selben Channel published.
  # Alle Counter/Flow-Felder erlaubt, damit Auto-EEP-Wechsel (M47) bei
  # Umstellung Strom <-> Gas <-> Wasser via PCT14 funktioniert.
  included_fields: [energy_kwh, current_w, volume_m3, flow_m3h, flow_l_min]
